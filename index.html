<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Privacy Mode</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 5px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 20px;
        }
        .video-container {
            border: 4px solid #333;
            border-radius: 10px;
            display: inline-block;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Gesture Privacy App</h1>
    <p>Perform hand gestures to switch modes in real-time.</p>
    <div class="video-container">
        <img src="{{ url_for('video_feed') }}" alt="Webcam Feed">
    </div>
</body>
</html>
